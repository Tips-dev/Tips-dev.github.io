name: Build site from CSV

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate pages
        run: python tools/generate.py

      - name: Publish generated site to root
        run: |
          rm -rf checklists robots.txt sitemap.xml index.html
          cp -R site/* .
          rm -rf site

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Auto-generate site" || echo "No changes to commit"
          git push
