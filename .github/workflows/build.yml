name: Build site from CSV

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate variant CSV
        run: python tools/variants.py

      - name: Generate site pages
        run: python tools/generate.py

      - name: Disable Jekyll
        run: touch site/.nojekyll

      - name: Validate sitemap
        run: python -c "import xml.etree.ElementTree as ET; ET.parse('site/sitemap.xml')"

      - name: Copy generated site to root
        run: |
          rm -rf checklists robots.txt sitemap.xml index.html .nojekyll
          cp -R site/* .
          rm -rf site

      - name: Preview sitemap
        run: head -n 20 sitemap
