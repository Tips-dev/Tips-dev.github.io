name: Generate Checklist Variants

on:
  push:
    paths:
      - 'checklists.csv'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run generator
        run: python scripts/generate_variants.py

      - name: Commit generated file
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add generated_checklists.csv
          git commit -m "Auto generated checklist variants"
          git push
