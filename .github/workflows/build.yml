name: Build site from CSV

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-site-main
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    # Prevent infinite loop when workflow commits files
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate variant CSV
        run: python tools/variants.py

      - name: Generate site pages
        run: python tools/generate.py

      - name: Disable Jekyll
        run: touch site/.nojekyll

      - name: Validate sitemap
        run: python -c "import xml.etree.ElementTree as ET; ET.parse('site/sitemap.xml'); print('Sitemap XML valid')"

      - name: Copy generated site to root
        run: |
          rm -rf checklists
          rm -f robots.txt sitemap.xml sitemap-pages-*.xml index.html .nojekyll
          cp -R site/* .
          rm -rf site

      - name: Preview sitemap
        run: |
          echo "----- sitemap.xml head -----"
          ls -la
          head -n 20 sitemap.xml
          echo "----------------------------"

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Auto build site" || echo "No changes"
          git push
