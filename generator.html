<!DOCTYPE html>
<html>
<head>
<title>Checklist Page Generator</title>
</head>

<body>

<h2>Checklist Generator</h2>
<p>This will generate HTML pages from checklists.csv</p>

<script>

async function loadCSV() {

const response = await fetch('checklists.csv');
const text = await response.text();

const rows = text.split('\n').slice(1);

rows.forEach(row => {

const columns = row.split(',');

const slug = columns[0];
const title = columns[1];
const category = columns[2];
const intro = columns[3];

const section1Title = columns[4];
const section1Items = columns[5].split('|');

const section2Title = columns[6];
const section2Items = columns[7].split('|');

let list1 = '';
let list2 = '';

section1Items.forEach(item => {
list1 += `<li>${item}</li>`;
});

section2Items.forEach(item => {
list2 += `<li>${item}</li>`;
});

const page = `

<!DOCTYPE html>
<html>
<head>
<title>${title}</title>
<meta name="description" content="${title} printable checklist">
</head>

<body>

<h1>${title}</h1>

<p>${intro}</p>

<h2>${section1Title}</h2>
<ul>
${list1}
</ul>

<h2>${section2Title}</h2>
<ul>
${list2}
</ul>

</body>
</html>

`;

console.log("PAGE FOR:", slug);
console.log(page);

});

}

loadCSV();

</script>

</body>
</html>
